server {
    listen 80;
    server_name 72.62.137.175;

    # Frontend — arquivos estáticos gerados pelo "vite build"
    root /var/www/pocket-finance-genius/dist;
    index index.html;

    # SPA: qualquer rota que não seja arquivo cai no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy reverso para a API Express (porta 3001)
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
